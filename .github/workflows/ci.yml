name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck tunnel install.sh scripts/*.sh 2>/dev/null || true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build scanners
        run: |
          ./scripts/build-scanners.sh
          ./scripts/build-scanners.sh --os darwin --arch amd64 --dest /tmp/test-build
      - name: Verify binaries
        run: |
          file bin/cfst bin/senpaiscanner
          bin/cfst -v 2>&1 | head -1
